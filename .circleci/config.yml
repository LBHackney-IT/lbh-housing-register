version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.0.0
  aws_assume_role: lbh-hackit/aws_assume_role@0.1.0
  cypress: cypress-io/cypress@3
  node: circleci/node@7.1.0
  sonarcloud: sonarsource/sonarcloud@2.0.0

executors:
  node-executor:
    docker:
      - image: cimg/node:24.14-browsers
    environment:
      # Avoid broken DISPLAY=:99 from cimg. Cypress can fail on verify step (after tests pass) intermittenlly without it.
      DISPLAY: ''
      XVFB_TIMEOUT: 60

references:
  workspace_root: &workspace_root '.'
  attach_workspace: &attach_workspace
    attach_workspace:
      at: *workspace_root
  # assume_role write to ~/.aws, not under the repository
  home_dir: &home_dir /home/circleci
  attach_aws_workspace: &attach_aws_workspace
    attach_workspace:
      at: *home_dir

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ Anchors ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ #

exclude_combinations:
  &exclude_combinations # exclude screen combinations that don't make sense for testing outside of the defined matrix.
  - browser: chrome
    height: 480
    width: 1536
  - browser: chrome
    height: 480
    width: 1366
  - browser: chrome
    height: 480
    width: 1024
  - browser: firefox
    height: 480
    width: 1536
  - browser: firefox
    height: 480
    width: 1366
  - browser: firefox
    height: 480
    width: 1024
  - browser: chrome
    height: 768
    width: 1536
  - browser: chrome
    height: 768
    width: 1366
  - browser: chrome
    height: 768
    width: 320
  - browser: firefox
    height: 768
    width: 1536
  - browser: firefox
    height: 768
    width: 1366
  - browser: firefox
    height: 768
    width: 320
  - browser: chrome
    height: 960
    width: 1024
  - browser: chrome
    height: 960
    width: 320
  - browser: firefox
    height: 960
    width: 1024
  - browser: firefox
    height: 960
    width: 320

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ Commands ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ #
commands:
  install-python3:
    description: 'Python venv for aws-cli'
    steps:
      - run:
          name: Install python
          command: |
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3-venv
  assume-role-and-persist-workspace:
    description: 'Assumes deployment role and persists credentials across jobs'
    parameters:
      aws-account:
        type: string
    steps:
      - checkout
      - install-python3
      - aws_assume_role/assume_role:
          account: <<parameters.aws-account>>
          profile_name: default
          role: 'LBH_Circle_CI_Deployment_Role'
      - persist_to_workspace:
          root: *home_dir
          paths:
            - .aws
  deploy-lambda:
    description: 'Deploys lambda via Serverless'
    parameters:
      stage:
        type: enum
        enum: ['development', 'staging', 'production']
      aws-central-parameter-account:
        type: enum
        enum:
          [
            'AWS_ACCOUNT_DEVELOPMENT',
            'AWS_ACCOUNT_STAGING',
            'AWS_ACCOUNT_PRODUCTION',
          ]
    steps:
      - *attach_aws_workspace
      - checkout
      - *attach_workspace
      - aws-cli/install
      - run:
          name: Build and deploy lambda
          command: |
            npx --yes serverless@4 deploy \
              --stage <<parameters.stage>> \
              --param="centralAccount=${<<parameters.aws-central-parameter-account>>}" \
              --conceal

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ Jobs ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ #
jobs:
  run-tests:
    executor: node-executor
    steps:
      - cypress/install
      - cypress/run-tests:
          cypress-command: npx cypress run --component --reporter junit
      - run:
          name: Run Jest Tests
          command: npm run test:ci
          environment:
            JEST_JUNIT_OUTPUT_DIR: test_results
            JEST_JUNIT_ADD_FILE_ATTRIBUTE: 'true'
      - store_test_results:
          path: test_results
      - store_artifacts:
          path: coverage
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - coverage
  sonar-scan:
    executor: node-executor
    steps:
      - checkout:
          method: full
      - *attach_workspace
      - sonarcloud/scan
  build:
    executor: node-executor
    steps:
      - checkout
      - node/install-packages
      - run:
          name: Build Next application
          command: npm run build
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - build
            - node_modules
  run-cypress-e2e:
    executor: node-executor
    resource_class: medium+
    parallelism: 8
    parameters:
      browser:
        type: string
        default: chrome
      height:
        type: integer
        default: 768
      width:
        type: integer
        default: 1366
    # Next.js must expose /api/e2e/* for app-process Nock. This job has no Circle context for API URLs,
    # so set server env here — must match what Cypress registers via /api/e2e/nock (see .env.sample).
    environment:
      E2E_HTTP_MOCKS: 'true'
      PORT: '3000'
      # 127.0.0.1 avoids IPv6 localhost (::1) vs nock/axios scope mismatches in Docker.
      HOUSING_REGISTER_API: 'http://127.0.0.1:3910/api/v1/'
      HOUSING_REGISTER_KEY: 'testing'
      ACTIVITY_HISTORY_API: 'http://127.0.0.1:3600/api/v1'
      LOOKUP_API_URL: 'http://127.0.0.1:3920'
    steps:
      # cypress/install checks out the code, installs dependencies (including NPM), etc. It uses optimal caching strategies for NPM with npm ci.
      - cypress/install:
          install-browsers: true
      # Production bundle + node_modules from the build job (required for `next start`).
      - *attach_workspace
      - run:
          name: Start Next.js for E2E
          background: true
          command: npm run start
      - run:
          name: Wait for Next.js on port 3000
          command: |
            for i in $(seq 1 60); do
              if curl -sf -o /dev/null "http://127.0.0.1:3000/"; then
                echo "Next.js is ready"
                exit 0
              fi
              echo "Waiting for Next.js ($i/60)..."
              sleep 2
            done
            echo "Timed out waiting for http://127.0.0.1:3000"
            exit 1
      - run:
          name: Split E2E tests for parallel run
          command: |
            find cypress/e2e -type f -name "*.[jt]s" | sort | uniq > circleci_test_files.txt
            # Use time-based splitting for maximum efficiency. Cypress expects files to be separated with commas
            circleci tests split --split-by=timings circleci_test_files.txt | perl -pe 'chomp if eof' | tr '\n' ',' > circleci_test_slice.txt
            cat circleci_test_slice.txt
      - cypress/run-tests:
          cypress-command: npx cypress run --browser=<< parameters.browser >> --config viewportHeight=<< parameters.height >>,viewportWidth=<< parameters.width >> --reporter junit --reporter-options "mochaFile=cypress/results/results-[hash].xml" --spec "$(cat circleci_test_slice.txt)"
      - run:
          name: Fix up JUnit output
          command: node scripts/fix-junit-xml.js
      # Store the test results so CircleCI can provide insights and do parallel test splitting
      - store_test_results:
          path: cypress/results
      # We also store the test results as an artefact so we can download/access them when we need
      - store_artifacts:
          path: cypress/results
  assume-role-development:
    executor: node-executor
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_DEVELOPMENT
  assume-role-staging:
    executor: node-executor
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_STAGING
  assume-role-production:
    executor: node-executor
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_PRODUCTION
  deploy-to-development:
    executor: node-executor
    steps:
      - deploy-lambda:
          stage: 'development'
          aws-central-parameter-account: 'AWS_ACCOUNT_DEVELOPMENT'
  deploy-to-staging:
    executor: node-executor
    steps:
      - deploy-lambda:
          stage: 'staging'
          aws-central-parameter-account: 'AWS_ACCOUNT_STAGING'
  deploy-to-production:
    executor: node-executor
    steps:
      - deploy-lambda:
          stage: 'production'
          aws-central-parameter-account: 'AWS_ACCOUNT_PRODUCTION'

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ Workflows ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ #
workflows:
  version: 2
  continuous-delivery:
    jobs:
      - run-tests:
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
      - build:
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
      - run-cypress-e2e:
          filters:
            tags:
              ignore: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
          matrix:
            parameters:
              browser: [chrome, firefox]
              # mobile, tablet, chromebook/desktop
              height: [480, 768, 960]
              # mobile, tablet, chromebook, desktop
              width: [320, 1024, 1366, 1536]
            exclude: *exclude_combinations
          requires:
            - build
      - sonar-scan:
          context: SonarCloud
          requires:
            - run-tests
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
      - assume-role-development:
          context: api-assume-role-housing-development-context
          requires:
            - run-tests
            - run-cypress-e2e
          filters:
            tags:
              ignore: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              only: [development, bugfix/broken-auth]
      - deploy-to-development:
          context:
            - central-parameter-store-context
            - housing-register-fe-build-context
            - Serverless Framework
          requires:
            - assume-role-development
            - build
          filters:
            tags:
              ignore: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              only: [development, bugfix/broken-auth]
      - assume-role-staging:
          context: api-assume-role-housing-staging-context
          requires:
            - run-tests
          filters:
            tags:
              ignore: /.*/
            branches:
              only: main
      - deploy-to-staging:
          context:
            - central-parameter-store-context
            - housing-register-fe-build-context
            - Serverless Framework
          requires:
            - assume-role-staging
            - build
          filters:
            tags:
              ignore: /.*/
            branches:
              only: main
      - assume-role-production:
          context: api-assume-role-housing-production-context
          requires:
            - run-tests
            - build
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              ignore: /.*/
      - deploy-to-production:
          context:
            - central-parameter-store-context
            - housing-register-fe-build-context
            - Serverless Framework
          requires:
            - assume-role-production
            - build
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              ignore: /.*/
