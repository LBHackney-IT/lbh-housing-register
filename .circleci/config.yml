# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ Workflows ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ #
workflows:
  version: 2
  continuous-delivery:
    jobs:
      - run-tests:
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
      - build:
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/

      - run-cypress-e2e:
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
          matrix:
            parameters:
              browser: [chrome, firefox]
              # mobile, tablet, chromebook/desktop
              height: [480, 768, 960]
              # mobile, tablet, chromebook, desktop
              width: [320, 1024, 1366, 1536]
            exclude: *exclude_combinations
          requires:
            - build

      - sonar-scan:
          context: SonarCloud
          requires:
            - run-tests
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/

      # - assume-role-development:
      #     context: api-assume-role-development-context
      #     # requires:
      #     #   - run-tests
      #     #   - run-cypress-e2e
      #     filters:
      #       tags:
      #         ignore: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
      #       branches:
      #         # only: development
      #         only: feature/upgrade-next

      - deploy-to-development:
          context:
            - api-assume-role-development-context
            - housing-register-fe-build-context
            - Serverless Framework
          # requires:
          #   - assume-role-development
          filters:
            tags:
              ignore: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              only: feature/upgrade-next

      - assume-role-staging:
          context: api-assume-role-staging-context
          requires:
            - run-tests
            - run-cypress-e2e
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              ignore: /.*/

      - deploy-to-staging:
          context:
            - api-assume-role-staging-context
            - housing-register-fe-build-context
            - Serverless Framework
          requires:
            - assume-role-staging
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              ignore: /.*/

      - permit-deploy-production:
          type: approval
          requires:
            - deploy-to-staging
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              ignore: /.*/

      - assume-role-production:
          context: api-assume-role-production-context
          requires:
            - permit-deploy-production
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              ignore: /.*/

      - deploy-to-production:
          context:
            - api-assume-role-production-context
            - housing-register-fe-build-context
            - Serverless Framework
          requires:
            - assume-role-production
          filters:
            tags:
              only: /^hackney-housing-register-v[0-9]+(\.[0-9]+)*$/
            branches:
              ignore: /.*/
