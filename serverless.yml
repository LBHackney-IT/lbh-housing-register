# =============================================================================
# OpenNext deployment for the Housing Register frontend.
#
# Build prerequisites (run before `serverless deploy --config serverless.yml`):
#
#   1. npm run build:opennext                # produces .open-next/
#   2. mkdir -p build
#   3. (cd .open-next/server-functions/default && zip -qr ../../../build/opennext-server.zip .)
#   4. aws s3 sync .open-next/assets s3://<bucket-from-this-stack>/_assets \
#        --cache-control "public,max-age=31536000,immutable"
#
# CI does all of the above — see `.circleci/config.yml` (`build` and
# `deploy-lambda` commands).
#
# The handler entry inside the zip is `index.handler` (an ESM `.mjs` bundle that
# OpenNext produces from the Next server adapter).
#
# Notes:
#   - `package.artifact` points at a pre-built zip rather than using
#     `package.patterns`, because the OpenNext output expects to be unpacked
#     at the zip root (`index.mjs` next to `node_modules/`), and sls
#     `patterns` can't easily strip a directory prefix.
#   - Static assets are not packaged with the function — they live in S3 and
#     are routed via CloudFront (two origins: API Gateway for SSR, S3 for
#     `_next/static/*`, `BUILD_ID`, `favicon.ico`, `images/*`).
# =============================================================================
service: housing-register-frontend

provider:
  name: aws
  runtime: nodejs24.x
  versionFunctions: false
  region: eu-west-2
  stage: ${opt:stage}

package:
  individually: true

functions:
  housing-register-frontend:
    name: ${self:service}-${self:provider.stage}
    handler: index.handler
    # API Gateway REST integration limit is 29s; stay below to avoid confusing timeouts.
    timeout: 29
    # OpenNext recommends 1024 MB+ for Next 13/14/15. Bump from default to avoid
    # CPU-throttling on cold starts.
    memorySize: 1024
    package:
      # See header — this zip is produced by the build pipeline before `sls deploy`.
      artifact: build/opennext-server.zip
    events:
      - http: ANY /
      - http: ANY /{proxy+}
    vpc:
      securityGroupIds: ${self:custom.securityGroups.${self:provider.stage}}
      subnetIds: ${self:custom.subnets.${self:provider.stage}}
    environment:
      NEXT_PUBLIC_ENV: ${opt:stage}
      SKIP_VERIFY_TOKEN: false
      ACTIVITY_HISTORY_API: ${param:activityHistoryApi}
      LOOKUP_API_URL: ${param:lookupApiUrl}
      APP_URL: ${param:appUrl}
      AUTHORISED_ADMIN_GROUP: ${param:authorisedAdminGroup}
      AUTHORISED_MANAGER_GROUP: ${param:authorisedManagerGroup}
      AUTHORISED_OFFICER_GROUP: ${param:authorisedOfficerGroup}
      AUTHORISED_READONLY_GROUP: ${param:authorisedReadonlyGroup}
      HOUSING_REGISTER_API: ${param:housingRegisterApi}
      NOTIFY_TEMPLATE_NEW_APPLICATION: ${param:notifyTemplateNewApplication}
      NOTIFY_TEMPLATE_DISQUALIFY: ${param:notifyTemplateDisqualify}
      NOTIFY_TEMPLATE_MEDICAL_NEED: ${param:notifyTemplateMedicalNeed}
      NEXT_PUBLIC_EVIDENCE_STORE: ${param:evidenceStoreUrl}
      NEXT_PUBLIC_GTM_ID: ${param:gtmId}
      HOUSING_REGISTER_KEY: ${ssm:/housing-register/${self:provider.stage}/housing-register-api-key}
      HACKNEY_JWT_SECRET: ${ssm:/housing-register/${self:provider.stage}/hackney-jwt-secret}
      LOOKUP_API_TOKEN: ${ssm:/housing-register/${self:provider.stage}/lookup-api-key}
      NOTIFY_API_KEY: ${ssm:/housing-register/${self:provider.stage}/notify-api-key}

resources:
  Resources:
    # -------------------------------------------------------------------------
    # Static assets bucket — one per stage. Holds:
    #   /_assets/BUILD_ID
    #   /_assets/_next/static/...     (immutable, hashed filenames)
    #   /_assets/favicon.ico
    #   /_assets/images/...           (formerly public/images)
    # CloudFront reaches it via an Origin Access Control (OAC) — bucket stays
    # private; no public-read ACL.
    # -------------------------------------------------------------------------
    AssetsBucket:
      Type: AWS::S3::Bucket
      # Keep the bucket around if the stack is deleted or a failed UPDATE
      # rolls back
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-assets
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        OwnershipControls:
          Rules:
            - ObjectOwnership: BucketOwnerEnforced

    AssetsBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket:
          Ref: AssetsBucket
        PolicyDocument:
          Statement:
            - Sid: AllowSSLRequestsOnly
              Effect: Deny
              Principal:
                AWS: '*'
              Action: 's3:*'
              Resource:
                - Fn::GetAtt: [AssetsBucket, Arn]
                - Fn::Sub: '${AssetsBucket.Arn}/*'
              Condition:
                Bool:
                  aws:SecureTransport: 'false'
            - Sid: AllowCloudFrontServicePrincipalReadOnly
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource:
                Fn::Sub: '${AssetsBucket.Arn}/*'
              Condition:
                StringLike:
                  AWS:SourceArn:
                    Fn::Sub: 'arn:aws:cloudfront::${AWS::AccountId}:distribution/*'

    AssetsOriginAccessControl:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: ${self:service}-${self:provider.stage}-assets-oac
          OriginAccessControlOriginType: s3
          SigningBehavior: always
          SigningProtocol: sigv4

    CloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Aliases:
            - ${self:custom.aliases.${self:provider.stage}}
          PriceClass: PriceClass_100
          ViewerCertificate:
            AcmCertificateArn: ${self:custom.certificate-arn.${self:provider.stage}}
            MinimumProtocolVersion: TLSv1.2_2018
            SslSupportMethod: sni-only
          Enabled: true

          # Default = SSR (Lambda via API Gateway). Anything not matched by a
          # CacheBehavior below falls here.
          DefaultCacheBehavior:
            TargetOriginId: api-gw-${self:provider.stage}
            ViewerProtocolPolicy: 'redirect-to-https'
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - PATCH
              - POST
              - DELETE
            DefaultTTL: 0
            MaxTTL: 0
            MinTTL: 0
            # SSR needs query strings + cookies forwarded for auth + Next data.
            ForwardedValues:
              QueryString: true
              Cookies:
                Forward: all

          # Static asset behaviors. Ordered most-specific first.
          # NOTE: do NOT add `_next/*` here as a broad rule — `_next/data/*`
          # must continue to fall through to the SSR default.
          CacheBehaviors:
            - PathPattern: '_next/static/*'
              TargetOriginId: assets-${self:provider.stage}
              ViewerProtocolPolicy: 'redirect-to-https'
              AllowedMethods: [GET, HEAD]
              CachedMethods: [GET, HEAD]
              # Hashed filenames; safe to cache aggressively.
              DefaultTTL: 31536000
              MaxTTL: 31536000
              MinTTL: 31536000
              ForwardedValues:
                QueryString: false
                Cookies:
                  Forward: none
              Compress: true
            # Next reads /BUILD_ID client-side to detect new deploys. Short TTL
            # so a fresh deploy is reflected quickly.
            - PathPattern: 'BUILD_ID'
              TargetOriginId: assets-${self:provider.stage}
              ViewerProtocolPolicy: 'redirect-to-https'
              AllowedMethods: [GET, HEAD]
              CachedMethods: [GET, HEAD]
              DefaultTTL: 60
              MaxTTL: 60
              MinTTL: 0
              ForwardedValues:
                QueryString: false
                Cookies:
                  Forward: none
              Compress: true
            - PathPattern: 'favicon.ico'
              TargetOriginId: assets-${self:provider.stage}
              ViewerProtocolPolicy: 'redirect-to-https'
              AllowedMethods: [GET, HEAD]
              CachedMethods: [GET, HEAD]
              DefaultTTL: 86400
              MaxTTL: 86400
              MinTTL: 86400
              ForwardedValues:
                QueryString: false
                Cookies:
                  Forward: none
              Compress: true
            - PathPattern: 'images/*'
              TargetOriginId: assets-${self:provider.stage}
              ViewerProtocolPolicy: 'redirect-to-https'
              AllowedMethods: [GET, HEAD]
              CachedMethods: [GET, HEAD]
              DefaultTTL: 86400
              MaxTTL: 86400
              MinTTL: 86400
              ForwardedValues:
                QueryString: false
                Cookies:
                  Forward: none
              Compress: true

          Origins:
            # SSR origin — API Gateway, stage-prefixed (unchanged from legacy stack).
            - Id: api-gw-${self:provider.stage}
              DomainName: ${self:custom.domain-name}
              OriginPath: /${self:provider.stage}
              CustomOriginConfig:
                HTTPPort: 80
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
            # Static origin — private S3 bucket, accessed via OAC.
            # OriginPath '/_assets' matches the prefix the build script writes to.
            - Id: assets-${self:provider.stage}
              DomainName:
                Fn::GetAtt: [AssetsBucket, RegionalDomainName]
              OriginPath: /_assets
              S3OriginConfig:
                OriginAccessIdentity: ''
              OriginAccessControlId:
                Fn::GetAtt: [AssetsOriginAccessControl, Id]

  Outputs:
    AssetsBucketName:
      Description: 'S3 bucket holding OpenNext static assets (sync `.open-next/assets/` here in CI).'
      Value:
        Ref: AssetsBucket
      Export:
        Name: ${self:service}-${self:provider.stage}-AssetsBucket
    CloudFrontDistributionId:
      Description: 'Use for `aws cloudfront create-invalidation` after deploys.'
      Value:
        Ref: CloudFrontDistribution
      Export:
        Name: ${self:service}-${self:provider.stage}-CloudFrontDistribution

custom:
  domain-name:
    Fn::Join:
      - '.'
      - - Ref: ApiGatewayRestApi
        - execute-api
        - eu-west-2
        - amazonaws.com
  aliases:
    development: housing-register-development.hackney.gov.uk
    staging: housing-register-staging.hackney.gov.uk
    production: housing-register.hackney.gov.uk
  certificate-arn:
    development: arn:aws:acm:us-east-1:364864573329:certificate/955e7d76-1147-4102-9179-8880641875eb
    staging: arn:aws:acm:us-east-1:087586271961:certificate/5a0d62b9-688d-4a24-8cfe-fbb45b893fb5
    production: arn:aws:acm:us-east-1:282997303675:certificate/e0a3cc0b-024c-4009-bc2e-69c36d918d61
  securityGroups:
    development:
      - sg-0de8a8ee9797b9e47
    staging:
      - sg-01f034186031943c1
    production:
      - sg-0326e27e3d605c143
  subnets:
    development:
      - subnet-0140d06fb84fdb547
      - subnet-05ce390ba88c42bfd
    staging:
      - subnet-0ea0020a44b98a2ca
      - subnet-0743d86e9b362fa38
    production:
      - subnet-0beb266003a56ca82
      - subnet-06a697d86a9b6ed01
